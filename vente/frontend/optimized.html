<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vente Voitures de Luxe Sénégal - Optimisé</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//images.unsplash.com">
    
    <style>
        /* Critical CSS for above-the-fold content */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loader-car {
            font-size: 4rem;
            color: #FFD700;
            animation: carMove 2s ease-in-out infinite;
        }
        @keyframes carMove {
            0%, 100% { transform: translateX(-50px); }
            50% { transform: translateX(50px); }
        }
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6)),
                        url('https://images.unsplash.com/photo-1549394656-7e5c6b3b3b9b?w=1920&q=80&auto=format&fit=crop') center/cover;
        }
        .hero-content {
            text-align: center;
            color: white;
            z-index: 2;
            max-width: 800px;
            padding: 0 2rem;
        }
        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: bold;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }
        .highlight {
            background: linear-gradient(45deg, #FFD700, #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <!-- Critical content only -->
    <div class="loader" id="loader">
        <div class="loader-car">
            <i class="fas fa-car"></i>
        </div>
        <p>Chargement ultra-rapide...</p>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-line">Trouvez la voiture</span>
                <span class="title-line highlight">de vos rêves</span>
                <span class="title-line">au Sénégal</span>
            </h1>
            <p class="hero-subtitle">Collection exclusive de véhicules de luxe et d'exception</p>
        </div>
    </section>

    <!-- Lazy load the rest of the content -->
    <div id="app-content"></div>

    <script>
        // Optimized loading strategy
        window.addEventListener('load', function() {
            // Hide loader quickly
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                }, 200);
            }, 500);
            
            // Load main content
            fetch('index.html')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const appContent = document.getElementById('app-content');
                    
                    // Extract and append the main content
                    const mainContent = doc.querySelector('body').innerHTML;
                    appContent.innerHTML = mainContent;
                    
                    // Load scripts after content is loaded
                    loadScript('script.js');
                });
        });
        
        function loadScript(src) {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            document.body.appendChild(script);
        }
        
        // Preload critical resources
        const preloadImages = [
            'https://images.unsplash.com/photo-1617654112369-920fb567b0b6?w=800&q=80&auto=format&fit=crop'
        ];
        
        preloadImages.forEach(src => {
            const link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.href = src;
            document.head.appendChild(link);
        });
    </script>
</body>
</html>
